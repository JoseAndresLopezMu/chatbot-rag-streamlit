name: CI — Chatbot RAG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. LINT ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint dependencies
        # Only lightweight deps — heavy ML stack is mocked in tests/conftest.py
        run: pip install ruff

      - name: Ruff — check
        run: ruff check .

  # ─── 2. TEST ───────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install pytest loguru tqdm

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─── 3. SECURITY SCAN ─────────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r . -x .venv,tests -ll -q
